<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scanner">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Badge Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600&display=swap');

  :root {
    --green: #00ff87;
    --yellow: #ffdd00;
    --red: #ff4d4d;
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* CONFIG */
  #config {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    padding: 48px 24px 32px;
    gap: 24px;
  }

  #config h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #config h2 { font-size: 22px; font-weight: 600; line-height: 1.2; }

  .field { display: flex; flex-direction: column; gap: 8px; }

  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--green); }

  #config-save {
    margin-top: auto;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }

  /* INSTALL BANNER */
  #install-banner {
    position: fixed;
    bottom: 24px;
    left: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--green);
    border-radius: 14px;
    padding: 16px 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #install-banner.show { display: flex; }

  #install-banner p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }

  #install-banner p span {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  #install-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  #install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
  }

  /* MAIN APP */
  #app {
    display: none;
    flex-direction: column;
    height: 100dvh;
    position: relative;
  }

  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 0;
  }

  #counter {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--green);
  }

  #settings-btn {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
  }

  #viewfinder {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }
  #motion-canvas { display: none; }

  .scan-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 75vw;
    max-width: 320px;
    aspect-ratio: 16/9;
    pointer-events: none;
  }

  .scan-frame::before, .scan-frame::after,
  .scan-frame span::before, .scan-frame span::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-style: solid;
    transition: border-color 0.3s;
  }

  .scan-frame.idle::before, .scan-frame.idle::after,
  .scan-frame.idle span::before, .scan-frame.idle span::after { border-color: rgba(255,255,255,0.3); }

  .scan-frame.detecting::before, .scan-frame.detecting::after,
  .scan-frame.detecting span::before, .scan-frame.detecting span::after { border-color: var(--yellow); }

  .scan-frame.locked::before, .scan-frame.locked::after,
  .scan-frame.locked span::before, .scan-frame.locked span::after { border-color: var(--green); }

  .scan-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .scan-frame::after { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .scan-frame span::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .scan-frame.locked .scan-line {
    opacity: 0.8;
    animation: scan 1s ease-in-out infinite;
  }

  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 24px 40px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #status-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    transition: color 0.3s;
    height: 16px;
  }

  #status-text.detecting { color: var(--yellow); }
  #status-text.locked { color: var(--green); }

  #stability-bar-wrap {
    width: 120px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #stability-bar-wrap.show { opacity: 1; }

  #stability-bar {
    height: 100%; width: 0%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  #scan-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: white;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  #scan-btn:active { transform: scale(0.93); }
  #scan-btn.active {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 32px rgba(0,255,135,0.4);
    color: #000;
  }

  #result-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 24px;
    z-index: 20;
  }

  #result-overlay.show { display: flex; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .result-card.success { border-color: var(--green); }
  .result-card.error { border-color: var(--red); }

  .result-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .success .result-status { color: var(--green); }
  .error .result-status { color: var(--red); }

  .result-name { font-size: 22px; font-weight: 600; line-height: 1.2; margin-bottom: 6px; }
  .result-company { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .result-message { font-size: 15px; color: var(--muted); line-height: 1.5; }

  #reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 32px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
  }

  #saving-indicator {
    position: absolute;
    top: 72px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 30;
  }

  #saving-indicator.show { opacity: 1; }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="config">
  <h1>Setup</h1>
  <h2>Badge Scanner<br>Configuration</h2>
  <div class="field">
    <label>Gemini API Key</label>
    <input type="password" id="gemini-key" placeholder="AIza..." autocomplete="off">
  </div>
  <div class="field">
    <label>n8n Webhook URL</label>
    <input type="url" id="webhook-url" placeholder="https://n8n.your-domain.com/webhook/..." autocomplete="off">
  </div>
  <button id="config-save">Start Scanning</button>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <p>Install Badge Scanner <span>Add to home screen for offline access</span></p>
  <button id="install-btn">Install</button>
  <button id="install-dismiss">✕</button>
</div>

<!-- APP -->
<div id="app">
  <div id="header">
    <div id="counter">0 scanned</div>
    <div id="settings-btn">⚙</div>
  </div>

  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <canvas id="motion-canvas"></canvas>
    <div class="scan-frame idle" id="scan-frame">
      <span></span>
      <div class="scan-line"></div>
    </div>
  </div>

  <div id="controls">
    <div id="status-text">Point camera at badge</div>
    <div id="stability-bar-wrap"><div id="stability-bar"></div></div>
    <button id="scan-btn" disabled>TAP</button>
  </div>

  <div id="result-overlay">
    <div class="result-card" id="result-card">
      <div class="result-status" id="result-status"></div>
      <div class="result-name" id="result-name"></div>
      <div class="result-company" id="result-company"></div>
      <div class="result-message" id="result-message"></div>
    </div>
    <button id="reset-btn">Scan Another</button>
  </div>

  <div id="saving-indicator">Saving to Excel...</div>
</div>

<script>
// ── SERVICE WORKER ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/badgescanner/sw.js')
      .catch(e => console.log('SW registration failed:', e));
  });
}

// ── PWA INSTALL PROMPT ───────────────────────────────────────
let deferredPrompt;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const installDismiss = document.getElementById('install-dismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  installBanner.classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

installDismiss.addEventListener('click', () => installBanner.classList.remove('show'));

window.addEventListener('appinstalled', () => installBanner.classList.remove('show'));

// ── CONFIG ───────────────────────────────────────────────────
const LS = { get: k => localStorage.getItem(k)||'', set: (k,v) => localStorage.setItem(k,v) };
const configEl = document.getElementById('config');
const appEl = document.getElementById('app');

document.getElementById('config-save').addEventListener('click', () => {
  const key = document.getElementById('gemini-key').value.trim();
  const url = document.getElementById('webhook-url').value.trim();
  if (!key || !url) { alert('Both fields are required.'); return; }
  LS.set('gemini_key', key);
  LS.set('webhook_url', url);
  showApp();
});

document.getElementById('settings-btn').addEventListener('click', () => {
  stopMotionDetection();
  document.getElementById('gemini-key').value = LS.get('gemini_key');
  document.getElementById('webhook-url').value = LS.get('webhook_url');
  configEl.style.display = 'flex';
  appEl.style.display = 'none';
});

function showApp() {
  configEl.style.display = 'none';
  appEl.style.display = 'flex';
  startCamera();
}

// ── COUNTER ──────────────────────────────────────────────────
const counterEl = document.getElementById('counter');
let count = parseInt(LS.get('scan_count')||'0');
function updateCounter() { counterEl.textContent = `${count} scanned`; }
function incrementCounter() { count++; LS.set('scan_count', count); updateCounter(); }
updateCounter();

// ── CAMERA ───────────────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const motionCanvas = document.getElementById('motion-canvas');
const scanBtn = document.getElementById('scan-btn');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.onplaying = () => {
      scanBtn.disabled = false;
      motionCanvas.width = 160;
      motionCanvas.height = 90;
      startMotionDetection();
    };
  } catch(e) {
    alert('Camera access required. Please allow camera access and refresh.');
  }
}

// ── MOTION DETECTION ─────────────────────────────────────────
const frame = document.getElementById('scan-frame');
const statusText = document.getElementById('status-text');
const stabilityBarWrap = document.getElementById('stability-bar-wrap');
const stabilityBar = document.getElementById('stability-bar');

const MOTION_THRESHOLD = 25;
const STABLE_FRAMES_NEEDED = 12;
const MOTION_CHECK_INTERVAL = 55;

let prevImageData = null;
let stableFrames = 0;
let motionInterval = null;
let isScanning = false;

function getMotionScore() {
  const ctx = motionCanvas.getContext('2d');
  ctx.drawImage(video, 0, 0, 160, 90);
  const current = ctx.getImageData(0, 0, 160, 90);
  if (!prevImageData) { prevImageData = current; return 999; }
  let diff = 0;
  for (let i = 0; i < current.data.length; i += 4) {
    diff += Math.abs(current.data[i] - prevImageData.data[i]);
  }
  prevImageData = current;
  return diff / (160 * 90);
}

function getBrightness() {
  const ctx = motionCanvas.getContext('2d');
  const data = ctx.getImageData(0, 0, 160, 90).data;
  let total = 0;
  for (let i = 0; i < data.length; i += 4) total += (data[i]+data[i+1]+data[i+2])/3;
  return total / (160 * 90);
}

function startMotionDetection() {
  motionInterval = setInterval(() => {
    if (isScanning) return;
    const motion = getMotionScore();
    const brightness = getBrightness();
    const hasContent = brightness > 20 && brightness < 240;

    if (!hasContent) {
      setFrameState('idle', 'Point camera at badge', 0);
      stableFrames = 0;
      return;
    }

    if (motion > MOTION_THRESHOLD) {
      stableFrames = Math.max(0, stableFrames - 2);
      setFrameState('detecting', 'Hold steady...', stableFrames / STABLE_FRAMES_NEEDED * 100);
    } else {
      stableFrames = Math.min(STABLE_FRAMES_NEEDED, stableFrames + 1);
      const progress = stableFrames / STABLE_FRAMES_NEEDED * 100;
      if (stableFrames >= STABLE_FRAMES_NEEDED) {
        setFrameState('locked', 'Scanning...', 100);
        triggerScan();
      } else {
        setFrameState('detecting', 'Hold steady...', progress);
      }
    }
  }, MOTION_CHECK_INTERVAL);
}

function stopMotionDetection() {
  if (motionInterval) { clearInterval(motionInterval); motionInterval = null; }
}

function setFrameState(state, text, progress) {
  frame.className = `scan-frame ${state}`;
  statusText.className = state;
  statusText.textContent = text;
  stabilityBar.style.width = `${progress}%`;
  if (state === 'idle') {
    stabilityBarWrap.classList.remove('show');
    scanBtn.classList.remove('active');
  } else {
    stabilityBarWrap.classList.add('show');
    if (state === 'locked') scanBtn.classList.add('active');
    else scanBtn.classList.remove('active');
  }
}

// ── CAPTURE ──────────────────────────────────────────────────
function captureFrame() {
  const MAX_W = 800;
  let w = video.videoWidth, h = video.videoHeight;
  if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
}

// ── GEMINI ───────────────────────────────────────────────────
async function callGemini(base64Image) {
  const key = LS.get('gemini_key');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
  const body = {
    contents: [{ parts: [
      { inline_data: { mime_type: 'image/jpeg', data: base64Image } },
      { text: 'Return JSON only, no markdown: {"first_name":"","last_name":"","company":""}. Extract from badge. Null if missing.' }
    ]}],
    generationConfig: { thinkingConfig: { thinkingBudget: 0 } }
  };
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`Gemini ${res.status}`);
  const data = await res.json();
  return JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim());
}

// ── N8N SAVE ─────────────────────────────────────────────────
function saveToExcel(parsed) {
  const url = LS.get('webhook_url');
  if (!url) return;
  const ind = document.getElementById('saving-indicator');
  ind.classList.add('show');
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ first_name: parsed.first_name, last_name: parsed.last_name, company: parsed.company })
  }).finally(() => setTimeout(() => ind.classList.remove('show'), 1500));
}

// ── SCAN ─────────────────────────────────────────────────────
async function triggerScan() {
  if (isScanning) return;
  isScanning = true;
  stableFrames = 0;
  try {
    const image = captureFrame();
    if (!image || image.length < 1000) { showError('Capture failed. Try again.'); return; }
    const parsed = await callGemini(image);
    showSuccess(parsed);
    saveToExcel(parsed);
  } catch(e) {
    console.error(e);
    showError('Could not read badge. Try again.');
  }
}

scanBtn.addEventListener('click', () => {
  if (isScanning || scanBtn.disabled) return;
  triggerScan();
});

// ── RESULT UI ────────────────────────────────────────────────
const overlay = document.getElementById('result-overlay');
const card = document.getElementById('result-card');

function showSuccess(data) {
  card.className = 'result-card success';
  document.getElementById('result-status').textContent = '✓ Badge captured';
  document.getElementById('result-name').textContent = [data.first_name, data.last_name].filter(Boolean).join(' ') || '—';
  document.getElementById('result-company').textContent = data.company || '—';
  document.getElementById('result-message').textContent = '';
  overlay.classList.add('show');
  incrementCounter();
}

function showError(msg) {
  card.className = 'result-card error';
  document.getElementById('result-status').textContent = '✕ Scan failed';
  document.getElementById('result-name').textContent = '';
  document.getElementById('result-company').textContent = '';
  document.getElementById('result-message').textContent = msg;
  overlay.classList.add('show');
}

document.getElementById('reset-btn').addEventListener('click', () => {
  overlay.classList.remove('show');
  setFrameState('idle', 'Point camera at badge', 0);
  isScanning = false;
  prevImageData = null;
});

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('gemini-key').value = LS.get('gemini_key');
document.getElementById('webhook-url').value = LS.get('webhook_url');
if (LS.get('gemini_key') && LS.get('webhook_url')) showApp();
else configEl.style.display = 'flex';
</script>
</body>
</html>
